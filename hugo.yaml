      path: "blogs"
      count: 3
      title: Recent Posts
      enable: true
      disableFeaturedImage: false
    socialNetworks:
      github: https://github.com/youssefokeil
      linkedin: https://www.linkedin.com/in/youssef-okeil/

  # List pages like blogs and posts
