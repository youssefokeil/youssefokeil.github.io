  # projects
projects:
  enable: true
  items:
    - title: ARENA 3.0 - Mechanistic Interpretability & AI Safety
      content: Implemented core ML and AI safety concepts from scratch following the ARENA 3.0 curriculum, covering information theory, transformer architectures, and mechanistic interpretability techniques including activation patching and circuit analysis.
      image: /images/projects/arena.png
      featured:
        name: GitHub
        link: https://github.com/youssefokeil/arena-3.0
      badges:
        - "Python"
        - "PyTorch"
        - "TransformerLens"
        - "HuggingFace"
      links:
        - icon: fab fa-github
          url: https://github.com/youssefokeil/arena-3.0

    - title: BERT Hiring Model - Bias Detection and Mitigation
      content: Trained BERT classifier with intentionally imbalanced data; developed counterfactual augmentation pipeline to detect and mitigate gender bias in automated hiring decisions.
      image: /images/projects/bert-bias.png
      featured:
        name: GitHub
        link: https://github.com/youssefokeil/Uncovering-Bias-and-Explaining-Decisions-in-a-Text-Based-Job-Screening-Model
      badges:
        - "Python"
        - "BERT"
        - "SHAP"
        - "FairML"
        - "PyTorch"
      links:
        - icon: fab fa-github
          url: https://github.com/youssefokeil/Uncovering-Bias-and-Explaining-Decisions-in-a-Text-Based-Job-Screening-Model

    - title: Style Transfer Implementation
      content: Reimplemented neural style transfer from the Gatys et al. paper using a 19-layer VGG Network, demonstrating ability to translate a mathematical algorithm from academic literature into clean, working Python code.
      image: /images/projects/style-transfer.png
      featured:
        name: GitHub
        link: https://github.com/youssefokeil/Gatys-et-Al-reimplementation
      badges:
        - "Python"
        - "PyTorch"
        - "VGG-19"
        - "CNN"
      links:
        - icon: fab fa-github
          url: https://github.com/youssefokeil/Gatys-et-Al-reimplementation

    - title: Shoplifting Detection using Computer Vision
      content: Built end-to-end video analysis pipeline using LSTM and Visual Transformer (ViT) for real-time anomaly detection; structured as a callable Python module with a clear API.
      image: /images/projects/shoplifting.png
      featured:
        name: GitHub
        link: https://github.com/youssefokeil/Shoplifting-Detection
      badges:
        - "Python"
        - "PyTorch"
        - "LSTM"
        - "ViT"
        - "OpenCV"
      links:
        - icon: fab fa-github
          url: https://github.com/youssefokeil/Shoplifting-Detection

    - title: Architecture Style Classifier
      content: Applied transfer learning with ResNet-34 and deployed an interactive Gradio demo on Hugging Face Spaces, gaining experience packaging and releasing Python tools for end-users.
      image: /images/projects/architecture.png
      featured:
        name: Demo
        link: https://huggingface.co/spaces/Youssef-Okeil/ArchitectureClassifier
      badges:
        - "Python"
        - "ResNet-34"
        - "FastAI"
        - "Gradio"
      links:
        - icon: fab fa-github
          url: https://github.com/youssefokeil/Shoplifting-Detection

    - title: Reinforcement Learning - Q-Learning & PPO
      content: Trained and deployed Q-Learning agents on FrozenLake and Taxi-v3, and PPO agents on LunarLander and Huggy, publishing model weights and evaluation results to Hugging Face.
      image: /images/projects/rl.png
      featured:
        name: HuggingFace
        link: https://huggingface.co/Youssef-Okeil
      badges:
        - "Python"
        - "PyTorch"
        - "Stable-Baselines3"
        - "Gymnasium"
        - "HuggingFace"
      links:
        - icon: fab fa-github
          url: https://huggingface.co/Youssef-Okeil
