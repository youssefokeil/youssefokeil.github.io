baseURL: "https://youssefokeil.github.io"
languageCode: "en-us"
title: "Youssef Okeil"
theme: hugo-profile

# Multilingual configuration
defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

languages:
  en:
    languageName: "English"
    weight: 1
    contentDir: "content"
    

outputs:
  home:
    - "HTML"
    - "RSS"
    - "JSON"
  page:
    - "HTML"
    - "RSS"

enableRobotsTXT: true

#services:
  #googleAnalytics:
    #id: G-MEASUREMENT_ID
  #disqus:
    #shortname: your-disqus-shortname

pagination:
  pagerSize: 3

markup:
  goldmark:
    renderer:
      unsafe: true



params:
  title: "Youssef Okeil"
  description: Text about my cool site
  # staticPath: ""  # The path to serve the static files from
  favicon: "/fav.png"

  # Whether to serve bootstrap css and js files from CDN or not. Can be set to true, "css" or "js" to choose between
  # serving both, only the css, or only the js files through the CDN. Any other value will make so that CDN is not used.
  # Note the lack of "" in true, it should be of boolean type.
  useBootstrapCDN: false

  # If you want to load dynamically responsive images from Cloudinary
  # This requires your images to be uploaded + hosted on Cloudinary
  # Uncomment and change YOUR_CLOUD_NAME to the Cloud Name in your Cloudinary console
  # cloudinary_cloud_name: "YOUR_CLOUD_NAME"

  # Whether to add mathjax support on all pages. Alternatively, you can opt-in per page by adding `mathjax: true` in the frontmatter.
  mathjax: false

  # Whether the fade animations on the home page will be enabled
  animate: true

  theme:
    disableThemeToggle: false
    defaultTheme: "light" # dark

  font:
    fontSize: 1rem # default: 1rem
    fontWeight: 400 # default: 400
    lineHeight: 1.5 # default: 1.5
    textAlign: left # default: left

  # color preference
  # When using hex codes for colors, quotations must be used along with the # sign
  color:
    textColor: "#2d2d2d"
    secondaryTextColor: "#5c5c5c"
    textLinkColor: "#5b8fa8"
    backgroundColor: "#f5f5f0"
    secondaryBackgroundColor: "#e8e8e0"
    primaryColor: "#5b8fa8"
    secondaryColor: "#f0f0eb"

    darkmode:
      textColor: "#e4e6eb"
      secondaryTextColor: "#b0b3b8"
      textLinkColor: "#88b4c8"
      backgroundColor: "#18191a"
      secondaryBackgroundColor: "#212529"
      primaryColor: "#88b4c8"
      secondaryColor: "#212529"

  # If you want to customize the menu, you can change it here
  navbar:
    align: ms-auto # Left: ms-auto | center: mx-auto | right: me-auto | Default: ms-auto
    # brandLogo: "/logo.png" # Logo for the brand | default is the favicon variable
    # showBrandLogo: false # Show brand logo in nav bar | default is true
    brandName: "Youssef Okeil" # Brand name for the brand | default is the title variable
    disableSearch: false
    # searchPlaceholder: "Search"
    stickyNavBar:
      enable : true
      showOnScrollUp : true
    enableSeparator: false
    menus:
      disableAbout: false
      disableExperience: false
      disableEducation: false
      disableProjects: false
      disableAchievements: true
      disableContact: false

  # Hero
  hero:
    enable: true
    intro: "Hi, my name is"
    title: "Youssef."
    subtitle: "I am trying to make AI safer for life on earth."
    content: | 
          Final-year Computer and Systems Engineering student with strong Python and C/C++ skills and passion for information & probability theories as lenses for learning about the world. 
    
          Actively seeking AI Safety opportunities to decrease catastrophic risks from ASI & AGI.
    image: /images/hero.jpg
    bottomImage:
      enable: true
    # roundImage: true # Make hero image circular | default false
    button:
      enable: true
      name: "Resume"
      url: "https://drive.google.com/file/d/1vrQTDz5_rImfZ-VfYIvPQlQ0SxTxR43l/view?usp=sharing"
      download: true
      newPage: true
    socialLinks:
      fontAwesomeIcons:
        - icon: fab fa-github
          url: https://github.com/youssefokeil

  # About
  about:
    enable: true
    title: "About Me"
    image: "/images/me.jpg"
    bottomImage:
      enable: true
      roundimage: false
    content: |-
      I am an AI engineer with deep passion for AI safety for the last 4 years. Through independent study and coursework I learnt to be able to work with and analyze frontier models.

      I am using those skills in developing a product to absorb the second-hand scene in Egypt and the Middle East, I am also working on a verification-acceleration project with Siemens as my graduation project.

      Seeking AI Safety opportunities to learn about interpretability & scheming models.
    skills:
      enable: true
      title: "Here are a few technologies I've been working with recently:"
      items:
        - "pytorch"
        - "python"
        - "FastAI"
        - "Linux"
        - "PostgreSQL"
        - "Docker"
        - "Supabase"
        - "Hugging Face"
        - "FairML"
        - "SHAP"
        - "LIME"
        - "Anthropic's Circuit Tracer"

  # Experience
  experience:
    enable: true
    # title: "Custom Name"
    items:
      - company: "Siemens"
        companyUrl: "https://siemens.com/"
        jobs:
          - name: "Graduation Project Researcher"
            date: "September 2025 - Present"
            content: |
                      Developing an ML pipeline to accelerate functional coverage in hardware verification, combining Reinforcement Learning and LLMs to guide SystemVerilog test generation. 

                      Integrating Python-based ML models with a C/SystemVerilog simulation environment via DPI-C, gaining direct
                      experience calling compiled C code from Python and vice versa. 
                      
                      Structuring the project as a clean, modular Python library with well-defined interfaces, argument parsing, and
                      reproducible experiment configuration. 
                      
                      **Tech Stack**: Python, C/C++, DPI-C, RAGs, LLMs, Reinforcement Learning, SystemVerilog, PyTorch
        
      - company: "BadeelMarketplace"
        jobs:
          - name: "Co-Founder & Lead AI Engineer"
            date: "March 2025 - Present"
            content: |
                      Building a full-stack application to digitize second-hand stores, with a React frontend and a Python backend
                      integrating the Gemini LLM API, ISBN Detection for automated product tagging and natural language descriptions.
                      
                      Releasing software intended for real end-users, requiring robust CLI tooling, packaging, and API design.
                      
                      **Tech Stack:** Python, React, JavaScript, Gemini API, REST APIs, Supabase, AWS, Docker.
    

      - company: "Talentino AI"
        companyUrl: "https://talentinoai.com/"
        jobs:
          - name: "Computer Vision Intern"
            date: "July 2024 - October 2024"
            content: |
                      Worked extensively in image processing, computer vision and computational intelligence applications.

                      Applied multiple deep learning techniques including CNN, LSTM, Attention Models, and Sentiment Analysis. 
                      
                      Implemented Style Transfer algorithms and advanced computer vision methodologies.

                      **Tech Stack**: Python, PyTorch, CNN, LSTMs, OpenCV, YOLO

      - company: "BlueDot Impact, UK"
        companyUrl: "https://bluedot.org/courses/ai-governance"
        jobs: 
        - name: "AI Safety Governance Fellow"
          date: "Jan 2025 - May 2025"
          content: |
            Non-technical policy course covering AI safety risks, regulation, and international frameworks; built foundational
              awareness of multi-agent and strategic interaction contexts.

      - company: "AI Safety, Hungary"
        companyUrl: "https://www.aishungary.com/activities/advanced-seminars"
        jobs: 
        - name: "AI Safety Governance Fellow"
          date: "Aug 2024 - Jan 2025"
          content: |
            covering AI governance policy frameworks, agent rationality literature, cooperative
              AI and study of game-theoretic concepts.

  # Education
  education:
    enable: true
    # title: "Custom Name"
    index: false
    items:
      - title: "Bachelor of Science in Computer & Systems Engineering"
        school:
          name: "Ain Shams University"
          url: "https://eng.asu.edu.eg/"
        date: "2021 - 2026"
        GPA: "3.33 out of 4.0"
        content: |-
          Key Modules: Machine Learning, Deep Learning, Mathematical Optimization (Linear Programming, Simplex
            Method), Operating Systems, Database Systems, Datheta Structures & Algorithms, Computer Networks, Software
            Engineering, Computer Architecture, Embedded Systems
      - title: "High School"
        school:
          name: "Egyptian Language School"
